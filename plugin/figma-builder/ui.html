<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { background: #170f2b; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: #170f2b;
      color: #ffffff;
      padding: 0;
      overflow: hidden;
    }
    .card {
      background: #170f2b;
      border-radius: 10px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    /* ── HEADER ── */
    .header { display: flex; flex-direction: column; gap: 3px; }
    .header-top { display: flex; align-items: center; justify-content: space-between; }
    .header-title { font-size: 14px; font-weight: 700; color: #ffffff; letter-spacing: -0.01em; }
    .hint-text { font-size: 14px; font-weight: 700; color: #ffffff; padding: 0; letter-spacing: -0.01em; }
    .desc-text { font-size: 11px; color: #5a5480; line-height: 1.5; }
    .badge {
      font-size: 11px; font-weight: 700; color: #4ade80;
      background: #142e1f; border-radius: 20px; padding: 3px 9px;
      white-space: nowrap; flex-shrink: 0;
    }
    .badge.warn { color: #fbbf24; background: #2d1a04; }
    .badge.idle { color: #6e7681; background: transparent; display: none; }

    /* ── ROW LIST ── */
    .comp-list {
      display: flex; flex-direction: column; gap: 5px; width: 100%;
      max-height: 174px; overflow-y: hidden; overflow-x: hidden;
      scrollbar-width: thin; scrollbar-color: #30363d transparent;
    }
    .comp-list.scrollable { overflow-y: auto; }
    .comp-list::-webkit-scrollbar { width: 3px; }
    .comp-list::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }
    .comp-row { display: flex; align-items: center; gap: 10px; min-height: 20px; }
    .row-icon { width: 13px; height: 13px; flex-shrink: 0; font-size: 11px; display: flex; align-items: center; justify-content: center; }
    .row-icon.ok   { color: #4ade80; }
    .row-icon.warn { color: #fbbf24; }
    .row-icon.bad  { color: #f85149; }
    .row-content { display: flex; align-items: center; gap: 6px; font-size: 13px; overflow: hidden; }
    .row-label { font-weight: 600; color: #ffffff; white-space: nowrap; flex-shrink: 0; }
    .row-arrow { color: #444c56; flex-shrink: 0; font-size: 11px; }
    .row-value { font-weight: 400; color: #a1a1aa; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .row-value.ok   { color: #4ade80; }
    .row-value.warn { color: #fbbf24; }

    /* ── STATUS LINE ── */
    .status-line { font-size: 11px; color: #6e7681; display: none; }
    .status-line.show  { display: block; }
    .status-line.info  { color: #58a6ff; }
    .status-line.error { color: #f85149; }
    .status-line.warn  { color: #fbbf24; }

    /* ── BUTTON ── */
    .btn-bind {
      width: 100%; height: 40px; background: #0070F2; color: #ffffff;
      border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
      cursor: pointer; letter-spacing: 0.01em; transition: background 0.15s; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-bind:hover    { background: #0060d0; }
    .btn-bind:active   { background: #0050b0; }
    .btn-bind:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── RESET BUTTON ── */
    .btn-reset {
      width: 100%; height: 36px; background: rgba(255,255,255,0.04);
      color: #a89ecf; border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px; font-size: 13px; font-weight: 500;
      cursor: pointer; letter-spacing: 0.01em; transition: all 0.15s;
      flex-shrink: 0; display: none;
      align-items: center; justify-content: center; gap: 6px;
    }
    .btn-reset:hover { background: rgba(255,255,255,0.08); color: #d4ccf0; border-color: rgba(255,255,255,0.16); }
    .btn-reset:active { background: rgba(255,255,255,0.12); }
    .btn-reset.show { display: flex; }

    /* ── FOOTER ── */
    .footer { display: flex; flex-direction: column; gap: 2px; }
    .cache-row {
      display: flex; align-items: center; gap: 5px;
      font-size: 10px; color: #5a5480;
      flex-wrap: nowrap; overflow: hidden; white-space: nowrap;
    }
    .cache-row .cv { color: #4ade80; font-weight: 600; white-space: nowrap; }
    .cache-row.scanning .cv { color: #58a6ff; }
    .cache-gear {
      background: none; border: none; cursor: pointer; color: #5a5480;
      padding: 0; line-height: 1; transition: color 0.1s; flex-shrink: 0;
      display: flex; align-items: center; width: 14px; height: 14px;
    }
    .cache-gear:hover { color: #a89ecf; }
    .cache-gear.open  { color: #d4ccf0; }
    .cache-gear svg { width: 14px; height: 14px; display: block; flex-shrink: 0; opacity: 1; transition: opacity 0.15s; }
    .cache-gear:hover svg { opacity: 0.85; }
    .cache-gear.open svg  { opacity: 1; }
    .maint-panel {
      display: none; flex-direction: column; gap: 5px; padding: 6px 0 2px;
      border-top: 1px solid #1e1e1e; margin-top: 2px;
    }
    .maint-panel.show { display: flex; }
    .build-stamp { font-size: 10px; color: #3a3560; flex-shrink: 0; }
    .maint-btns { display: flex; flex-wrap: nowrap; gap: 6px; }
    .maint-btn {
      border-radius: 6px; font-size: 11px; font-weight: 600;
      padding: 5px 12px; cursor: pointer; font-family: inherit; white-space: nowrap;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
      height: auto; width: auto; flex: 0;
    }
    #btn-harvest {
      background: #1a1a2e; color: #7c86ff; border: 1px solid #3d3d6b;
    }
    #btn-harvest:hover { background: #22224a; color: #a5acff; border-color: #5a5aaa; }
    #btn-export {
      background: #1a2a1e; color: #4ade80; border: 1px solid #2d5c3a;
    }
    #btn-export:hover { background: #1e3824; color: #6ee89a; border-color: #3d7a50; }
  </style>
</head>
<body>
<div class="card">

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div class="hint-text" id="hint-text">Select a frame and press the button</div>
      <div class="badge idle" id="panel-badge">PASS</div>
    </div>
    <div class="desc-text" id="desc-text">Resolves SAP design tokens and validates accessibility across the selected frame.</div>
  </div>

  <!-- Row list -->
  <div class="comp-list" id="comp-list"></div>

  <!-- Status line -->
  <div class="status-line" id="status-line"></div>

  <!-- Bind button (no icon) -->
  <button class="btn-bind" id="btn-bind" onclick="onBindTokens()">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 512 512" fill="currentColor" style="flex-shrink:0"><path d="M439.6 0H204.9L55.4 256h149.5l-128 256l341.3-320H247.5z"/></svg>
    Bind SAP Tokens
  </button>

  <!-- Reset: shown after successful bind -->
  <button class="btn-reset" id="btn-reset" onclick="resetUI()">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 2L4 7l5 5"/></svg>
    Bind another frame
  </button>

  <!-- Footer: build stamp + cache row with gear, maintenance panel below -->
  <div class="footer">
    <div class="cache-row scanning" id="cache-row">
      <span class="build-stamp" id="build-stamp">build 2026-07-14</span>
      <span style="color:#2a2a3e">·</span>
      Library cache: <span class="cv" id="cache-val">warming…</span>
      <button class="cache-gear" id="gear-btn" onclick="toggleMaint(this)" title="Settings">
        <svg viewBox="0 0 16 16" fill="currentColor">
          <path fill-rule="evenodd" d="M6.5 1a.5.5 0 0 0-.488.392L5.71 2.86a5.5 5.5 0 0 0-.98.567l-1.418-.47a.5.5 0 0 0-.582.224l-1.5 2.598a.5.5 0 0 0 .116.641l1.14.93a5.55 5.55 0 0 0 0 1.1l-1.14.93a.5.5 0 0 0-.116.641l1.5 2.598a.5.5 0 0 0 .582.224l1.418-.47c.308.215.634.404.98.567l.302 1.468A.5.5 0 0 0 6.5 15h3a.5.5 0 0 0 .488-.392l.302-1.468a5.5 5.5 0 0 0 .98-.567l1.418.47a.5.5 0 0 0 .582-.224l1.5-2.598a.5.5 0 0 0-.116-.641l-1.14-.93a5.55 5.55 0 0 0 0-1.1l1.14-.93a.5.5 0 0 0 .116-.641l-1.5-2.598a.5.5 0 0 0-.582-.224l-1.418.47a5.5 5.5 0 0 0-.98-.567L9.988 1.392A.5.5 0 0 0 9.5 1h-3zm1.5 4a3 3 0 1 0 0 6 3 3 0 0 0 0-6zm-1.75 3a1.75 1.75 0 1 1 3.5 0 1.75 1.75 0 0 1-3.5 0z"/>
        </svg>
      </button>
    </div>
    <div class="maint-panel" id="maint-panel">
      <div class="maint-btns">
        <button class="maint-btn" id="btn-harvest" onclick="onHarvestIcons()">Harvest Icon Keys</button>
        <button class="maint-btn" id="btn-export" onclick="onExportVariableKeys()">Export Var Keys</button>
      </div>
    </div>
  </div>

</div>
<script>
  var BIND_BTN_HTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 512 512" fill="currentColor" style="flex-shrink:0"><path d="M439.6 0H204.9L55.4 256h149.5l-128 256l341.3-320H247.5z"/></svg> Bind SAP Tokens';

  // ── Auto-resize ──────────────────────────────────────────
  function resizeUI() {
    var card = document.querySelector('.card');
    if (!card) return;
    var h = card.getBoundingClientRect().height;
    if (h < 40) return;
    parent.postMessage({ pluginMessage: { type: 'ui-resize', height: Math.round(h) } }, '*');
  }
  window.addEventListener('load', function() { setTimeout(resizeUI, 60); });
  var _card = document.querySelector('.card');
  if (window.ResizeObserver) new ResizeObserver(function() { resizeUI(); }).observe(_card);
  if (window.MutationObserver) new MutationObserver(function() { setTimeout(resizeUI, 10); }).observe(_card, { childList: true, subtree: true, attributes: true, characterData: true });

  // ── Gear / maintenance toggle ────────────────────────────
  function toggleMaint(btn) {
    var p = document.getElementById('maint-panel');
    p.classList.toggle('show');
    btn.classList.toggle('open');
    setTimeout(resizeUI, 30);
  }

  // ── Reset to idle ────────────────────────────────────────
  function resetUI() {
    document.getElementById('comp-list').innerHTML = '';
    document.getElementById('comp-list').classList.remove('scrollable');
    document.getElementById('status-line').className = 'status-line';
    document.getElementById('status-line').textContent = '';
    var btn = document.getElementById('btn-bind');
    btn.disabled = false; btn.innerHTML = BIND_BTN_HTML;
    document.getElementById('btn-reset').classList.remove('show');
    var badge = document.getElementById('panel-badge');
    badge.className = 'badge idle'; badge.textContent = '';
    document.getElementById('hint-text').textContent = 'Select a frame and press the button';
    var hint = document.getElementById('hint-text');
    if (hint) hint.style.display = '';
    document.getElementById('desc-text').style.display = '';
    setTimeout(resizeUI, 10);
  }

  // ── Status helpers ───────────────────────────────────────
  function setStatus(msg, type) {
    var el = document.getElementById('status-line');
    el.textContent = msg; el.className = 'status-line show ' + (type||'');
    setTimeout(resizeUI, 30);
  }
  function clearStatus() {
    var el = document.getElementById('status-line');
    el.className = 'status-line'; el.textContent = '';
  }

  // ── Row builder ──────────────────────────────────────────
  function makeRow(icon, iconCls, label, value, valueCls) {
    return '<div class="comp-row">' +
      '<div class="row-icon ' + iconCls + '">' + icon + '</div>' +
      '<div class="row-content">' +
        '<span class="row-label">' + label + '</span>' +
        '<span class="row-arrow">→</span>' +
        '<span class="row-value ' + (valueCls||'') + '">' + value + '</span>' +
      '</div></div>';
  }

  // ── Set rows + scroll if > 6 ─────────────────────────────
  function setRows(rows) {
    var list = document.getElementById('comp-list');
    var hint = document.getElementById('hint-text');
    list.innerHTML = rows.join('');
    list.classList.toggle('scrollable', rows.length > 6);
    setTimeout(resizeUI, 30);
  }

  // ── Bind ─────────────────────────────────────────────────
  function onBindTokens() {
    var btn = document.getElementById('btn-bind');
    btn.disabled = true; btn.innerHTML = 'Binding…';
    setStatus('Scanning frame…', 'info');
    var badge = document.getElementById('panel-badge');
    badge.className = 'badge idle'; badge.textContent = '';
    document.getElementById('comp-list').innerHTML = '';
    document.getElementById('btn-reset').classList.remove('show');
    setTimeout(resizeUI, 10);
    parent.postMessage({ pluginMessage: { type: 'bind-mcp-frame' } }, '*');
  }
  function onHarvestIcons() {
    parent.postMessage({ pluginMessage: { type: 'harvest-icon-keys' } }, '*');
  }
  function onExportVariableKeys() {
    document.getElementById('btn-export').textContent = 'Scanning…';
    parent.postMessage({ pluginMessage: { type: 'export-variable-keys' } }, '*');
  }  // ── Plugin messages ──────────────────────────────────────
  window.onmessage = function(ev) {
    var msg = ev.data.pluginMessage; if (!msg) return;

    if (msg.type === 'progress') { setStatus(msg.text, 'info'); resizeUI(); }

    else if (msg.type === 'success') {
      clearStatus();
      var btn = document.getElementById('btn-bind');
      btn.disabled = false; btn.innerHTML = BIND_BTN_HTML;

      var t = msg.text || '';
      function g(re, d) { var m=t.match(re); return m?m[1]:(d||'0'); }
      var frames   = g(/Bound (\d+) frame/);
      var fills    = g(/(\d+) fills/);
      var icons    = g(/(\d+) icons/);
      var styles   = g(/(\d+) text styles/);
      var contrast = g(/(\d+\/\d+) contrast/,'0/0');
      var a11y     = g(/(\d+) a11y issue/);
      var small    = g(/(\d+) too-small/);
      var nolabel  = g(/(\d+) no-label/);
      var headings = g(/(\d+) headings/);

      var issues = parseInt(a11y) > 0;
      var badge = document.getElementById('panel-badge');
      badge.textContent = issues ? '⚠ ' + a11y + ' issue' + (a11y==='1'?'':'s') : 'PASS';
      badge.className = 'badge' + (issues ? ' warn' : '');
      document.getElementById('hint-text').textContent = frames + ' frame' + (frames==='1'?'':'s') + ' bound · all verified';

      var rows = [];
      rows.push(makeRow('✓','ok','Fills',       fills  +' bound',   fills!=='0'?'ok':''));
      rows.push(makeRow('✓','ok','Icons',       icons  +' swapped', icons!=='0'?'ok':''));
      rows.push(makeRow('✓','ok','Text styles', styles +' bound',   styles!=='0'?'ok':''));
      var cp=contrast.split('/'), cok=cp[0]===cp[1];
      rows.push(makeRow(cok?'✓':'⚠',cok?'ok':'warn','Contrast',contrast+' WCAG AA',cok?'ok':'warn'));
      if (parseInt(small)>0)   rows.push(makeRow('⚠','warn','Tap targets',small+' too small','warn'));
      if (parseInt(nolabel)>0) rows.push(makeRow('⚠','warn','Labels',nolabel+' missing','warn'));
      if (headings!=='0')      rows.push(makeRow('✓','ok','Headings',headings+' detected','ok'));
      setRows(rows);
      document.getElementById('btn-reset').classList.add('show');
      document.getElementById('desc-text').style.display = 'none';
    }

    else if (msg.type === 'error') {
      setStatus('Error: ' + msg.text, 'error');
      var btn = document.getElementById('btn-bind');
      btn.disabled = false; btn.innerHTML = BIND_BTN_HTML;
    }

    else if (msg.type === 'warning') { setStatus('⚠ ' + msg.text, 'warn'); }

    else if (msg.type === 'library-cache-state') {
      var cr = document.getElementById('cache-row');
      var cv = document.getElementById('cache-val');
      if (msg.state === 'scanning') {
        cr.className = 'cache-row scanning'; cv.textContent = 'scanning…';
      } else if (msg.state === 'ready') {
        var ms=msg.ageMs||0, age='';
        if (msg.fromStorage && ms) {
          var mi=Math.round(ms/60000), h=Math.round(ms/3600000), d=Math.round(ms/86400000);
          age = mi<60?' ('+mi+'m old)':h<24?' ('+h+'h old)':d===1?' (1 day old)':' ('+d+' days old)';
        }
        cr.className = 'cache-row ready';
        cv.textContent = msg.totalVariables + ' variables' + age;
      }
    }

    else if (msg.type === 'export-variable-keys-result') {
      document.getElementById('btn-export').textContent = 'Export Var Keys';
      var pt = msg.patchJson||'';
      if (pt && navigator.clipboard)
        navigator.clipboard.writeText(pt).then(function(){ setStatus('✓ '+msg.found+' keys copied','info'); })
          .catch(function(){ setStatus('✓ '+msg.found+' keys harvested','info'); });
    }

    else if (msg.type === 'build-exceptions') { /* handled in success */ }
  };
</script>
</body>
</html>
